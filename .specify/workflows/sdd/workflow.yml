schema_version: "1.0"
workflow:
  id: "sdd"
  name: "SDD Cycle"
  version: "1.2.0"
  author: "peterelmwood"
  description: "branch → specify → plan → tasks → analyze → apply → gate → implement; mandatory feature branch first, single gate before implement"

requires:
  speckit_version: ">=0.8.5"
  integrations:
    any:
      - "claude"
      - "copilot"
      - "gemini"
      - "opencode"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe what you want to build"
  integration:
    type: string
    default: "auto"
    prompt: "Integration to use (e.g. claude, copilot, gemini; 'auto' uses the project's initialized integration)"
  scope:
    type: string
    default: "full"
    enum: ["full", "backend-only", "frontend-only"]

steps:
  # MANDATORY first step. Create/switch to an isolated feature branch before any
  # artifact is produced, so the whole cycle (spec, plan, tasks, implementation)
  # lands on a dedicated branch and never on a shared/integration branch.
  #
  # This is a required step, not an optional convenience: the cycle MUST NOT
  # proceed to `specify` on a shared branch. It delegates to the git extension's
  # speckit.git.feature, reusing the project-configured naming schema
  # (sequential `NNN-<short-name>` or timestamp `YYYYMMDD-HHMMSS-<short-name>`)
  # and honoring an explicit GIT_BRANCH_NAME override.
  #
  # Behavior notes:
  #  - Already on a valid feature branch for this feature → the branch is reused
  #    (no duplicate/renumbered branch).
  #  - Git unavailable / not a repository → speckit.git.feature surfaces a clear
  #    warning and does NOT report a false success; the cycle must not silently
  #    proceed as if the work were isolated.
  - id: branch
    command: speckit.git.feature
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: apply-analysis
    type: prompt
    integration: "{{ inputs.integration }}"
    prompt: >-
      Review the findings from the preceding speckit.analyze run for this
      feature. Apply every remediation suggestion that resolves an
      inconsistency, ambiguity, or gap across spec.md, plan.md, and tasks.md,
      editing those artifacts directly. Do not ask for confirmation; apply the
      fixes. If analyze reported no issues, make no changes and say so.

  - id: review-before-implement
    type: gate
    message: "Spec, plan, tasks, and analysis (with fixes applied) are ready. Approve to begin implementation."
    options: [approve, reject]
    on_reject: abort

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"
